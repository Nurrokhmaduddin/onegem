server {
    listen 80;
    server_name 192.168.1.100;  # Ganti dengan IP/domain server Anda

    root /var/www/erp-berlian;
    index index.php;

    # Ukuran upload maksimal (sesuaikan dengan config/app.php)
    client_max_body_size 12M;

    # Logging
    access_log /var/log/nginx/erp-berlian.access.log;
    error_log  /var/log/nginx/erp-berlian.error.log;

    # Semua request → index.php (front controller)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Blokir akses langsung ke folder sensitif
    location ~ ^/(config|shared|logs|sql|\.env|\.git) {
        deny all;
        return 403;
    }

    # PHP via PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # Static assets (CSS, JS, image) — cache 30 hari
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header X-XSS-Protection      "1; mode=block"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
